<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Void Survivors: Elder Horrors</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@700;900&display=swap');

        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; background: #020205; color: white; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        canvas { display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2,2,8,0.93);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }

        /* ── Start Screen ── */
        #start-screen {
            background: radial-gradient(ellipse at 50% 60%, #0d0020 0%, #020205 70%);
        }
        #start-screen h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(36px, 6vw, 72px);
            color: #c084fc;
            text-shadow: 0 0 40px #8c1eff, 0 0 80px #4c00a0;
            letter-spacing: 8px;
            margin-bottom: 6px;
        }
        #start-screen .subtitle {
            font-size: 13px; letter-spacing: 4px; color: #6b7280; margin-bottom: 50px;
        }
        .key-hint { color: #4b5563; font-size: 12px; margin-top: 18px; letter-spacing: 2px; }
        .key-hint span { color: #a78bfa; }

        /* ── Buttons ── */
        button {
            padding: 14px 44px; font-size: 16px; background: transparent;
            color: #c084fc; border: 1px solid #7c3aed; cursor: pointer;
            font-family: 'Share Tech Mono', monospace; letter-spacing: 3px;
            transition: all 0.2s; text-transform: uppercase; position: relative; overflow: hidden;
        }
        button::before {
            content: ''; position: absolute; inset: 0;
            background: #7c3aed; opacity: 0; transition: opacity 0.2s;
        }
        button:hover { color: white; text-shadow: 0 0 8px white; border-color: #c084fc; }
        button:hover::before { opacity: 0.25; }

        /* ── HUD ── */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; pointer-events: none;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 16px 20px;
        }
        #hud-left { display: flex; flex-direction: column; gap: 6px; }
        #hearts { font-size: 20px; letter-spacing: 2px; }
        #xp-bar-container {
            width: 200px; height: 6px; background: #111827;
            border: 1px solid #1f2937; border-radius: 3px; overflow: hidden;
        }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #06b6d4, #a78bfa); transition: width 0.1s; }
        #lvl-label { font-size: 11px; color: #6b7280; letter-spacing: 2px; }
        #lvl-label span { color: #a78bfa; }
        #aura-status { font-size: 11px; color: #8b5cf6; letter-spacing: 1px; min-height: 14px; }

        #hud-center { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #timer { font-family: 'Cinzel', serif; font-size: 36px; color: #e2e8f0; text-shadow: 0 0 12px #8c1eff; letter-spacing: 4px; }
        #wave-label { font-size: 10px; color: #4b5563; letter-spacing: 3px; }

        #hud-right { font-size: 11px; color: #4b5563; letter-spacing: 1px; text-align: right; display: flex; flex-direction: column; gap: 4px; }
        #kills-label span { color: #f87171; }
        #stats-label { color: #374151; }

        /* ── Boss Bar ── */
        #boss-bar-wrap {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            width: min(600px, 80vw); display: none; flex-direction: column; align-items: center; gap: 6px;
            pointer-events: none;
        }
        #boss-name { font-family: 'Cinzel', serif; font-size: 14px; color: #f87171; letter-spacing: 4px; }
        #boss-bar-bg { width: 100%; height: 10px; background: #111827; border: 1px solid #7f1d1d; border-radius: 2px; overflow: hidden; }
        #boss-bar-fill { height: 100%; background: linear-gradient(90deg, #dc2626, #ff6b6b); transition: width 0.1s; width: 100%; }

        /* ── Still Warning ── */
        #still-warning {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            color: #ef4444; font-weight: bold; font-size: 18px; display: none;
            text-shadow: 0 0 10px #ef4444; letter-spacing: 3px;
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

        /* ── Level Up ── */
        #level-up { background: rgba(2,2,10,0.97); gap: 0; }
        #level-up h2 {
            font-family: 'Cinzel', serif; color: #c084fc;
            font-size: 22px; letter-spacing: 6px; margin-bottom: 30px;
            text-shadow: 0 0 20px #7c3aed;
        }
        #upgrade-list { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .upg-btn {
            width: 200px; min-height: 120px; padding: 20px 16px;
            display: flex; flex-direction: column; gap: 8px;
            border: 1px solid #312e81; background: rgba(15,10,30,0.8);
            cursor: pointer; transition: all 0.2s; text-align: left; letter-spacing: 0;
        }
        .upg-btn:hover { border-color: #7c3aed; background: rgba(30,15,60,0.9); transform: translateY(-3px); }
        .upg-btn .upg-name { color: #c084fc; font-size: 14px; letter-spacing: 2px; }
        .upg-btn .upg-desc { color: #6b7280; font-size: 11px; line-height: 1.5; }
        .upg-btn .upg-icon { font-size: 24px; }

        /* ── End Screen ── */
        #end-title { font-family: 'Cinzel', serif; font-size: 42px; margin-bottom: 10px; }
        #end-stats { color: #6b7280; font-size: 13px; margin-bottom: 30px; line-height: 2; text-align: center; }

        /* ── Settings Toggle (Start Screen) ── */
        .settings-row {
            display: flex; align-items: center; gap: 14px;
            margin-top: 24px; padding: 14px 24px;
            border: 1px solid #1f2937; background: rgba(255,255,255,0.03);
        }
        .settings-label { font-size: 12px; letter-spacing: 3px; color: #6b7280; }
        .toggle-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-track {
            width: 42px; height: 22px; border-radius: 11px;
            background: #1f2937; border: 1px solid #374151;
            position: relative; transition: background 0.2s;
        }
        .toggle-track.on { background: #7c3aed; border-color: #a78bfa; }
        .toggle-thumb {
            position: absolute; top: 3px; left: 3px;
            width: 14px; height: 14px; border-radius: 50%;
            background: #6b7280; transition: all 0.2s;
        }
        .toggle-track.on .toggle-thumb { left: 23px; background: #fff; }
        .toggle-text { font-size: 11px; color: #4b5563; letter-spacing: 1px; min-width: 30px; }

        /* ── Pause Button (HUD) ── */
        #pause-btn {
            position: absolute; top: 16px; right: 20px;
            background: transparent; border: 1px solid #1f2937;
            color: #4b5563; padding: 6px 14px; font-size: 11px;
            letter-spacing: 2px; cursor: pointer; pointer-events: all;
            transition: all 0.15s; z-index: 10;
        }
        #pause-btn:hover { border-color: #7c3aed; color: #c084fc; }

        /* ── Pause Screen ── */
        #pause-screen { display: none; }
        #pause-screen h2 {
            font-family: 'Cinzel', serif; font-size: 32px; color: #c084fc;
            letter-spacing: 8px; margin-bottom: 10px;
            text-shadow: 0 0 20px #7c3aed;
        }
        #pause-screen p { color: #4b5563; font-size: 12px; letter-spacing: 3px; margin-bottom: 36px; }
        .pause-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

        /* ── Mobile Controls ── */
        #mobile-controls {
            display: none; /* shown via JS when mobile mode on */
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }
        /* Joystick zone — bottom-left */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 130px; height: 130px;
            pointer-events: all;
        }
        #joystick-base {
            width: 130px; height: 130px; border-radius: 50%;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(124,58,237,0.35);
            position: relative;
        }
        #joystick-thumb {
            position: absolute; width: 52px; height: 52px; border-radius: 50%;
            background: rgba(124,58,237,0.6);
            border: 2px solid #a78bfa;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            transition: background 0.1s;
            box-shadow: 0 0 14px rgba(139,92,246,0.5);
        }
        /* Mobile pause button — top-right */
        #mobile-pause-btn {
            position: absolute; top: 18px; right: 18px;
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(15,10,30,0.75);
            border: 1px solid #312e81;
            color: #a78bfa; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: all; cursor: pointer;
            transition: all 0.15s;
        }
        #mobile-pause-btn:active { background: rgba(124,58,237,0.4); }
    </style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="overlay">
    <h1>VOID SURVIVORS</h1>
    <div class="subtitle">ELDER HORRORS</div>
    <button onclick="startGame()">BEGIN RUN</button>
    <div class="key-hint"><span>WASD</span> Move &nbsp;|&nbsp; <span>ESC / P</span> Pause &nbsp;|&nbsp; Survive <span>20 Minutes</span></div>
    <div class="settings-row">
        <span class="settings-label">MOBILE CONTROLS</span>
        <div class="toggle-wrap" onclick="toggleMobileSetting()" id="mobile-toggle-wrap">
            <div class="toggle-track" id="mobile-toggle-track">
                <div class="toggle-thumb"></div>
            </div>
            <span class="toggle-text" id="mobile-toggle-text">OFF</span>
        </div>
    </div>
</div>

<!-- PAUSE SCREEN -->
<div id="pause-screen" class="overlay">
    <h2>PAUSED</h2>
    <p>THE VOID WAITS</p>
    <div class="pause-btns">
        <button onclick="resumeGame()">RESUME</button>
        <button onclick="location.reload()">QUIT RUN</button>
    </div>
</div>

<!-- END SCREEN -->
<div id="end-screen" class="overlay" style="display:none">
    <h1 id="end-title">CONSUMED BY DARKNESS</h1>
    <p id="end-stats"></p>
    <button onclick="location.reload()">TRY AGAIN</button>
</div>

<!-- HUD -->
<div id="hud">
    <div id="hud-left">
        <div id="hearts"></div>
        <div id="xp-bar-container"><div id="xp-bar"></div></div>
        <div id="lvl-label">LVL <span id="lvl">1</span></div>
        <div id="aura-status"></div>
    </div>
    <div id="hud-center">
        <div id="timer">20:00</div>
        <div id="wave-label">SURVIVE</div>
    </div>
    <div id="hud-right">
        <div id="kills-label">KILLS <span id="kills">0</span></div>
        <div id="stats-label">DMG <span id="stat-dmg">2</span> | SPD <span id="stat-spd">3.5</span></div>
    </div>
</div>
<button id="pause-btn" onclick="togglePause()" style="display:none">❚❚ PAUSE</button>

<!-- Boss HP bar -->
<div id="boss-bar-wrap">
    <div id="boss-name">BOSS</div>
    <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
</div>

<div id="still-warning">⚠ STILLNESS DETECTED — SWARM INCOMING ⚠</div>

<!-- Mobile Controls -->
<div id="mobile-controls">
    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-thumb"></div>
        </div>
    </div>
    <div id="mobile-pause-btn" onclick="togglePause()">⏸</div>
</div>

<!-- Level Up Menu -->
<div id="level-up" class="overlay" style="display:none">
    <h2>SELECT AUGMENT</h2>
    <div id="upgrade-list"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let w, h, audioCtx;

// ── Sound Engine ──────────────────────────────────────────────────
function playSound(freq, type, duration, vol = 0.08) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}
const sfx = {
    shoot: () => playSound(350, 'square', 0.08, 0.03),
    hit:   () => playSound(140, 'sawtooth', 0.08, 0.04),
    lvl:   () => { playSound(500, 'triangle', 0.3, 0.1); playSound(750, 'triangle', 0.3, 0.08); },
    boss:  () => playSound(40, 'sine', 1.2, 0.25),
    gem:   () => playSound(800, 'sine', 0.1, 0.04),
    death: () => { playSound(200, 'sawtooth', 0.6, 0.2); playSound(100, 'sine', 1, 0.3); }
};

// ── Game State ────────────────────────────────────────────────────
let gameState = 'START'; // START | PLAY | LEVEL | PAUSE | END
let frame = 0;
let gameTime = 1200;
let stillFrames = 0;
let killCount = 0;
let loopRunning = false;
let mobileEnabled = false; // toggled on start screen

// Mobile joystick state
const joystick = { active: false, dx: 0, dy: 0, touchId: null };

const player = {
    x: 0, y: 0,
    speed: 3.5,
    hp: 3, maxHp: 3, invuln: 0,
    xp: 0, nextXp: 5, lvl: 1,
    fireRate: 500, lastShot: 0,
    damage: 2, bulletSpeed: 10,
    projectiles: 1, pierce: 1, magnet: 80,
    spread: 0.22,
    auraRange: 0, auraActive: true, auraTimer: 600, auraCooldown: 0
};

// Arrays — replaced with filter-based removal to avoid splice-in-forEach bugs
let enemies = [], bullets = [], gems = [], particles = [];
let keys = {};
let bossActive = false, bossArena = null;
let bossRef = null, bossMaxHp = 1;

const upgrades = [
    { icon: '🧲', name: 'Magnetism',   desc: 'Pickup range +100. Gems fly to you faster.',          effect: () => player.magnet += 100 },
    { icon: '🌀', name: 'Holy Aura',   desc: '10s damage pulse every 20s in a growing ring.',        effect: () => { player.auraRange += 90; } },
    { icon: '⚡', name: 'Rapid Fire',  desc: 'Fire rate +25%. More bullets per second.',             effect: () => player.fireRate = Math.max(80, player.fireRate * 0.75) },
    { icon: '💀', name: 'Power Shot',  desc: 'Bullet damage +4. Each hit hurts more.',               effect: () => player.damage += 4 },
    { icon: '🔫', name: 'Multi-Shot',  desc: '+1 Projectile per burst. More spread coverage.',       effect: () => player.projectiles += 1 },
    { icon: '🗡️', name: 'Piercing',    desc: 'Bullets pierce +2 enemies before stopping.',          effect: () => player.pierce += 2 },
    { icon: '👟', name: 'Swiftness',   desc: 'Movement speed +1. Hard to catch.',                   effect: () => player.speed += 1 },
    { icon: '❤️', name: 'Resilience',  desc: '+1 Max HP and heal to full.',
        effect: () => { player.maxHp += 1; player.hp = player.maxHp; } },
    {
        icon: '🎯', name: 'Precision',
        desc: '-25% projectiles but massive damage & accuracy boost.',
        condition: () => player.projectiles >= 4,
        effect: () => {
            player.projectiles = Math.ceil(player.projectiles * 0.75);
            player.spread *= 0.4;
            player.damage = Math.floor(player.damage * 2.5);
            player.bulletSpeed += 6;
        }
    }
];

// ── Mobile Settings Toggle ─────────────────────────────────────────
function toggleMobileSetting() {
    mobileEnabled = !mobileEnabled;
    const track = document.getElementById('mobile-toggle-track');
    const text  = document.getElementById('mobile-toggle-text');
    track.classList.toggle('on', mobileEnabled);
    text.innerText = mobileEnabled ? 'ON' : 'OFF';
}

// ── Bootstrap ─────────────────────────────────────────────────────
function startGame() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('start-screen').style.display = 'none';
    resize();
    // Show correct controls
    if (mobileEnabled) {
        document.getElementById('mobile-controls').style.display = 'block';
        document.getElementById('pause-btn').style.display = 'none';
        setupJoystick();
    } else {
        document.getElementById('mobile-controls').style.display = 'none';
        document.getElementById('pause-btn').style.display = 'block';
    }
    gameState = 'PLAY';
    if (!loopRunning) { loopRunning = true; requestAnimationFrame(update); }
}

// ── Pause / Resume ────────────────────────────────────────────────
function togglePause() {
    if (gameState === 'PLAY')  { pauseGame(); }
    else if (gameState === 'PAUSE') { resumeGame(); }
}
function pauseGame() {
    if (gameState !== 'PLAY') return;
    gameState = 'PAUSE';
    keys = {};
    joystick.active = false; joystick.dx = 0; joystick.dy = 0;
    document.getElementById('pause-screen').style.display = 'flex';
    document.getElementById('pause-btn').innerText = '▶ RESUME';
    document.getElementById('mobile-pause-btn').innerText = '▶';
}
function resumeGame() {
    if (gameState !== 'PAUSE') return;
    gameState = 'PLAY';
    document.getElementById('pause-screen').style.display = 'none';
    document.getElementById('pause-btn').innerText = '❚❚ PAUSE';
    document.getElementById('mobile-pause-btn').innerText = '⏸';
    player.lastShot = Date.now(); // prevent instant shot burst after resume
}

// ── Joystick Setup ────────────────────────────────────────────────
function setupJoystick() {
    const zone  = document.getElementById('joystick-zone');
    const thumb = document.getElementById('joystick-thumb');
    const base  = document.getElementById('joystick-base');
    const R = 65; // max thumb travel radius (half of 130px base)

    function onTouchStart(e) {
        e.preventDefault();
        if (joystick.touchId !== null) return;
        const t = e.changedTouches[0];
        joystick.touchId = t.identifier;
        updateThumb(t);
    }
    function onTouchMove(e) {
        e.preventDefault();
        for (const t of e.changedTouches) {
            if (t.identifier === joystick.touchId) { updateThumb(t); break; }
        }
    }
    function onTouchEnd(e) {
        for (const t of e.changedTouches) {
            if (t.identifier === joystick.touchId) {
                joystick.active = false; joystick.dx = 0; joystick.dy = 0;
                joystick.touchId = null;
                thumb.style.transform = 'translate(-50%,-50%)';
                break;
            }
        }
    }
    function updateThumb(touch) {
        const rect = base.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top  + rect.height / 2;
        let dx = touch.clientX - cx;
        let dy = touch.clientY - cy;
        const dist = Math.hypot(dx, dy);
        if (dist > R) { dx = dx/dist*R; dy = dy/dist*R; }
        joystick.dx = dx / R;
        joystick.dy = dy / R;
        joystick.active = true;
        thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    zone.addEventListener('touchstart', onTouchStart, { passive: false });
    zone.addEventListener('touchmove',  onTouchMove,  { passive: false });
    zone.addEventListener('touchend',   onTouchEnd,   { passive: false });
    zone.addEventListener('touchcancel',onTouchEnd,   { passive: false });
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);

// FIX: clear keys on blur so movement doesn't stick when tabbing away
window.addEventListener('keydown', e => {
    if (e.code === 'Escape' || e.code === 'KeyP') { togglePause(); return; }
    if (gameState === 'PLAY') keys[e.code] = true;
});
window.addEventListener('keyup',   e => { keys[e.code] = false; });
window.addEventListener('blur',    () => { keys = {}; if (gameState === 'PLAY') pauseGame(); });

// ── Spawning ──────────────────────────────────────────────────────
function spawnBoss(name, hp, size, color) {
    if (bossActive) return; // don't stack bosses
    bossActive = true;
    bossArena = { x: player.x, y: player.y, r: 900 };
    bossMaxHp = hp;
    const boss = {
        x: player.x + 350, y: player.y,
        hp, speed: 1.3, size, color, isBoss: true, name,
        phase: 1, lastCharge: 0, chargeVx: 0, chargeVy: 0, charging: false
    };
    enemies.push(boss);
    bossRef = boss;
    sfx.boss();
    document.getElementById('boss-bar-wrap').style.display = 'flex';
    document.getElementById('boss-name').innerText = '☠ ' + name + ' ☠';
}

// ── Particles ─────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 5) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 1 + Math.random() * 3;
        particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 30 + Math.random()*20, maxLife: 50, color });
    }
}

// ── Main Loop ─────────────────────────────────────────────────────
function update() {
    if (gameState === 'END') { loopRunning = false; return; }
    requestAnimationFrame(update);
    if (gameState !== 'PLAY') return; // paused / level screen — keep loop alive, skip logic

    frame++;

    // ── Movement (keyboard + joystick) ──
    let dx = 0, dy = 0;
    if (keys['KeyW']) dy -= 1;
    if (keys['KeyS']) dy += 1;
    if (keys['KeyA']) dx -= 1;
    if (keys['KeyD']) dx += 1;
    if (joystick.active) { dx += joystick.dx; dy += joystick.dy; }
    // normalize if both sources contribute
    const dLen = Math.hypot(dx, dy);
    if (dLen > 1) { dx /= dLen; dy /= dLen; }

    const moving = dLen > 0.1;
    if (moving) stillFrames = 0; else stillFrames++;
    document.getElementById('still-warning').style.display = (stillFrames > 180) ? 'block' : 'none';

    player.x += dx * player.speed;
    player.y += dy * player.speed;

    // ── Arena boundary (boss) ──
    if (bossActive && bossArena) {
        const d = Math.hypot(player.x - bossArena.x, player.y - bossArena.y);
        if (d > bossArena.r - 25) {
            const a = Math.atan2(player.y - bossArena.y, player.x - bossArena.x);
            player.x = bossArena.x + Math.cos(a) * (bossArena.r - 26);
            player.y = bossArena.y + Math.sin(a) * (bossArena.r - 26);
        }
    }

    // ── Game timer (FIX: only count down when PLAY, not LEVEL) ──
    if (frame % 60 === 0 && !bossActive) {
        gameTime--;
        if (gameTime <= 0) { endGame(true); return; }
        // Boss milestones
        if (gameTime === 900) spawnBoss('The Warden',  800,  60, '#8c1eff');
        if (gameTime === 600) spawnBoss('The Hive',    1500, 70, '#00ff77');
        if (gameTime === 300) spawnBoss('The Behemoth',3500, 90, '#ff4400');
        if (gameTime === 60)  spawnBoss('VOID REAPER', 8000,120, '#ffffff');
    }

    // ── Aura ──
    if (player.auraRange > 0) {
        if (player.auraActive) {
            player.auraTimer--;
            if (frame % 30 === 0) {
                enemies.forEach(e => {
                    if (Math.hypot(e.x - player.x, e.y - player.y) < player.auraRange) {
                        e.hp -= player.damage * 0.5;
                        spawnParticles(e.x, e.y, '#a78bfa', 2);
                    }
                });
            }
            if (player.auraTimer <= 0) { player.auraActive = false; player.auraCooldown = 1200; }
        } else {
            player.auraCooldown--;
            if (player.auraCooldown <= 0) { player.auraActive = true; player.auraTimer = 600; }
        }
    }

    // ── Enemy Spawning ──
    // FIX: scale difficulty by time elapsed (1200 - gameTime)
    const elapsed = 1200 - gameTime;
    const baseSpawn = Math.max(10, 55 - Math.floor(elapsed / 50));
    const spawnRate = (stillFrames > 180) ? 4 : baseSpawn;
    if (frame % spawnRate === 0 && !bossActive) {
        const a = Math.random() * Math.PI * 2;
        const tier = Math.min(4, Math.floor(elapsed / 200)); // 0-4
        enemies.push({
            x: player.x + Math.cos(a) * 850,
            y: player.y + Math.sin(a) * 850,
            hp: 3 + tier * 2 + Math.random() * 2,
            speed: 1.4 + tier * 0.15 + Math.random() * 0.5,
            size: 11 + tier,
            color: ['#3d0a0a','#4a0e0e','#5a1010','#6b1010','#7f1010'][tier]
        });
    }

    // ── Shooting — auto-aim nearest enemy ──
    if (Date.now() - player.lastShot > player.fireRate && enemies.length > 0) {
        let nearest = null, minDist = Infinity;
        enemies.forEach(e => {
            const d = Math.hypot(e.x - player.x, e.y - player.y);
            if (d < minDist) { minDist = d; nearest = e; }
        });
        if (nearest) {
            const a = Math.atan2(nearest.y - player.y, nearest.x - player.x);
            for (let i = 0; i < player.projectiles; i++) {
                const sp = (i - (player.projectiles - 1) / 2) * player.spread;
                bullets.push({
                    x: player.x, y: player.y,
                    vx: Math.cos(a + sp) * player.bulletSpeed,
                    vy: Math.sin(a + sp) * player.bulletSpeed,
                    p: player.pierce,
                    hitSet: new Set() // FIX: use Set for hit tracking
                });
            }
            player.lastShot = Date.now();
            sfx.shoot();
        }
    }

    // ── Update Bullets (FIX: collect dead indices, filter after) ──
    const deadBullets = new Set();
    bullets.forEach((b, bi) => {
        if (deadBullets.has(bi)) return;
        b.x += b.vx; b.y += b.vy;
        if (Math.hypot(b.x - player.x, b.y - player.y) > 1400) { deadBullets.add(bi); return; }
        enemies.forEach((e, ei) => {
            if (deadBullets.has(bi) || b.hitSet.has(ei)) return;
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.size + 8) {
                e.hp -= player.damage;
                b.hitSet.add(ei);
                b.p--;
                spawnParticles(e.x, e.y, e.color, 3);
                sfx.hit();
                if (b.p <= 0) deadBullets.add(bi);
            }
        });
    });
    bullets = bullets.filter((_, i) => !deadBullets.has(i));

    // ── Update Enemies (FIX: filter, don't splice in forEach) ──
    const deadEnemies = new Set();
    enemies.forEach((e, i) => {
        if (deadEnemies.has(i)) return;

        // Boss special behavior: charge attack
        if (e.isBoss) {
            if (!e.charging && frame - e.lastCharge > 180) {
                // Wind up charge toward player
                const a = Math.atan2(player.y - e.y, player.x - e.x);
                e.chargeVx = Math.cos(a) * 6;
                e.chargeVy = Math.sin(a) * 6;
                e.charging = true;
                e.chargeFrames = 40;
            }
            if (e.charging) {
                e.x += e.chargeVx; e.y += e.chargeVy;
                e.chargeFrames--;
                if (e.chargeFrames <= 0) { e.charging = false; e.lastCharge = frame; }
            } else {
                const a = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(a) * e.speed;
                e.y += Math.sin(a) * e.speed;
            }
            // Phase 2: speed boost at half hp
            if (e.hp < bossMaxHp * 0.5 && e.phase === 1) {
                e.phase = 2; e.speed *= 1.5;
                spawnParticles(e.x, e.y, e.color, 20);
            }
        } else {
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(a) * e.speed;
            e.y += Math.sin(a) * e.speed;
        }

        // Damage player
        if (player.invuln <= 0 && Math.hypot(e.x - player.x, e.y - player.y) < e.size + 12) {
            player.hp--;
            player.invuln = 90;
            sfx.hit();
            if (player.hp <= 0) { endGame(false); return; }
        }

        // Enemy death
        if (e.hp <= 0) {
            deadEnemies.add(i);
            killCount++;
            spawnParticles(e.x, e.y, e.isBoss ? e.color : '#dc2626', e.isBoss ? 30 : 6);
            gems.push({ x: e.x, y: e.y, val: e.isBoss ? 60 : 1, big: !!e.isBoss });
            if (e.isBoss) {
                bossActive = false;
                bossRef = null;
                document.getElementById('boss-bar-wrap').style.display = 'none';
                // Restart timer
            }
        }
    });
    enemies = enemies.filter((_, i) => !deadEnemies.has(i));

    // ── Boss HP bar ──
    if (bossActive && bossRef) {
        document.getElementById('boss-bar-fill').style.width =
            Math.max(0, bossRef.hp / bossMaxHp * 100) + '%';
    }

    // ── Gems & XP (FIX: filter after loop) ──
    const deadGems = new Set();
    gems.forEach((g, i) => {
        const d = Math.hypot(g.x - player.x, g.y - player.y);
        if (d < player.magnet) {
            const a = Math.atan2(player.y - g.y, player.x - g.x);
            const spd = Math.min(14, 200 / d); // accelerate as they get closer
            g.x += Math.cos(a) * spd;
            g.y += Math.sin(a) * spd;
            if (d < 18) {
                player.xp += g.val;
                deadGems.add(i);
                sfx.gem();
                if (player.xp >= player.nextXp) {
                    player.lvl++;
                    player.xp -= player.nextXp;
                    player.nextXp = Math.floor(player.nextXp * 1.28 + 2);
                    triggerLevelUp();
                }
            }
        }
    });
    gems = gems.filter((_, i) => !deadGems.has(i));

    // ── Particles ──
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.92; p.vy *= 0.92; p.life--; });
    particles = particles.filter(p => p.life > 0);

    // ── Counters ──
    if (player.invuln > 0) player.invuln--;

    updateHUD();
    draw();
}

// ── HUD Update ────────────────────────────────────────────────────
function updateHUD() {
    // Hearts
    let heartStr = '';
    for (let i = 0; i < player.maxHp; i++) heartStr += i < player.hp ? '❤️' : '🖤';
    document.getElementById('hearts').innerText = heartStr;

    document.getElementById('lvl').innerText = player.lvl;
    document.getElementById('kills').innerText = killCount;
    document.getElementById('stat-dmg').innerText = player.damage;
    document.getElementById('stat-spd').innerText = player.speed.toFixed(1);

    const min = Math.floor(gameTime / 60);
    const sec = Math.floor(gameTime % 60);
    document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;

    const pct = Math.min(100, player.xp / player.nextXp * 100);
    document.getElementById('xp-bar').style.width = pct + '%';

    if (player.auraRange > 0) {
        document.getElementById('aura-status').innerText = player.auraActive
            ? `◉ AURA ${Math.ceil(player.auraTimer / 60)}s`
            : `○ RECHARGE ${Math.ceil(player.auraCooldown / 60)}s`;
    }
}

// ── Level Up Menu ─────────────────────────────────────────────────
function triggerLevelUp() {
    gameState = 'LEVEL';
    sfx.lvl();
    const menu = document.getElementById('level-up');
    const list = document.getElementById('upgrade-list');
    menu.style.display = 'flex';
    list.innerHTML = '';

    const available = upgrades.filter(u => !u.condition || u.condition());
    const picks = [...available].sort(() => Math.random() - 0.5).slice(0, 3);

    picks.forEach(upg => {
        const btn = document.createElement('div');
        btn.className = 'upg-btn';
        btn.innerHTML = `<div class="upg-icon">${upg.icon}</div>
            <div class="upg-name">${upg.name}</div>
            <div class="upg-desc">${upg.desc}</div>`;
        btn.onclick = () => {
            upg.effect();
            menu.style.display = 'none';
            gameState = 'PLAY';
            // FIX: no extra requestAnimationFrame — loop is already running
        };
        list.appendChild(btn);
    });
}

// ── Draw ──────────────────────────────────────────────────────────
function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#020205';
    ctx.fillRect(0, 0, w, h);

    // Camera: center on player
    ctx.save();
    ctx.translate(w / 2 - player.x, h / 2 - player.y);

    // Grid background (FIX: correct range covering full screen)
    ctx.strokeStyle = '#0d0d1a';
    ctx.lineWidth = 1;
    const gs = 80;
    const gx0 = Math.floor((player.x - w / 2) / gs) * gs;
    const gy0 = Math.floor((player.y - h / 2) / gs) * gs;
    for (let gx = gx0; gx <= gx0 + w + gs; gx += gs) {
        ctx.beginPath(); ctx.moveTo(gx, gy0); ctx.lineTo(gx, gy0 + h + gs); ctx.stroke();
    }
    for (let gy = gy0; gy <= gy0 + h + gs; gy += gs) {
        ctx.beginPath(); ctx.moveTo(gx0, gy); ctx.lineTo(gx0 + w + gs, gy); ctx.stroke();
    }

    // Boss arena ring
    if (bossActive && bossArena) {
        ctx.save();
        ctx.strokeStyle = 'rgba(139,0,0,0.4)';
        ctx.lineWidth = 12;
        ctx.setLineDash([20, 10]);
        ctx.lineDashOffset = -frame * 0.5;
        ctx.beginPath(); ctx.arc(bossArena.x, bossArena.y, bossArena.r, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }

    // Aura ring
    if (player.auraRange > 0 && player.auraActive) {
        ctx.save();
        const auraAlpha = 0.15 + 0.1 * Math.sin(frame * 0.1);
        ctx.strokeStyle = `rgba(139, 92, 246, ${auraAlpha})`;
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.auraRange, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
    }

    // Magnet range (faint)
    ctx.save();
    ctx.strokeStyle = 'rgba(6, 182, 212, 0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(player.x, player.y, player.magnet, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();

    // Gems
    gems.forEach(g => {
        ctx.save();
        ctx.shadowBlur = g.big ? 20 : 6;
        ctx.shadowColor = '#06b6d4';
        ctx.fillStyle = g.big ? '#a78bfa' : '#06b6d4';
        if (g.big) {
            ctx.fillRect(g.x - 5, g.y - 5, 10, 10);
        } else {
            ctx.fillRect(g.x - 3, g.y - 3, 6, 6);
        }
        ctx.restore();
    });

    // Particles
    particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2 * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    // Bullets
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#fbbf24';
    ctx.fillStyle = '#fde68a';
    bullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
    });
    ctx.restore();

    // Enemies
    enemies.forEach(e => {
        if (e.isBoss) {
            drawBoss(ctx, e);
        } else {
            drawEnemy(ctx, e.x, e.y, e.size, e.color);
        }
    });

    // Player
    drawPlayer(ctx, player.x, player.y, 15, player.invuln);

    ctx.restore(); // end camera transform
}

// ── Character Drawing ─────────────────────────────────────────────
function drawPlayer(ctx, x, y, size, invuln) {
    ctx.save();
    ctx.translate(x, y);
    const blink = invuln > 0 && frame % 10 < 5;
    ctx.globalAlpha = blink ? 0.35 : 1;

    // Body (hooded wraith)
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.quadraticCurveTo(size * 0.8, -size * 0.8, size * 0.9, size * 0.8);
    ctx.lineTo(-size * 0.9, size * 0.8);
    ctx.quadraticCurveTo(-size * 0.8, -size * 0.8, 0, -size);
    ctx.fill();

    // Hood shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(0, -size * 0.3, size * 0.65, 0, Math.PI, true);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#06b6d4';
    ctx.shadowBlur = 8; ctx.shadowColor = '#06b6d4';
    ctx.fillRect(-size * 0.28, -size * 0.38, size * 0.2, size * 0.18);
    ctx.fillRect(size * 0.08, -size * 0.38, size * 0.2, size * 0.18);
    ctx.restore();
}

function drawEnemy(ctx, x, y, size, color) {
    ctx.save();
    ctx.translate(x, y);
    const wobble = Math.sin(frame * 0.15 + x * 0.01) * 2;

    ctx.fillStyle = color;
    ctx.shadowBlur = 8; ctx.shadowColor = color;
    ctx.beginPath();
    ctx.moveTo(0, -size + wobble);
    ctx.quadraticCurveTo(size * 0.7, -size * 0.5, size * 0.8, size * 0.6);
    ctx.lineTo(-size * 0.8, size * 0.6);
    ctx.quadraticCurveTo(-size * 0.7, -size * 0.5, 0, -size + wobble);
    ctx.fill();

    // Red eyes
    ctx.fillStyle = '#ff4444';
    ctx.shadowBlur = 6; ctx.shadowColor = '#ff0000';
    ctx.fillRect(-size * 0.25, -size * 0.2, size * 0.18, size * 0.15);
    ctx.fillRect(size * 0.07, -size * 0.2, size * 0.18, size * 0.15);
    ctx.restore();
}

function drawBoss(ctx, e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    const rot = frame * 0.04;
    const pulse = 1 + 0.06 * Math.sin(frame * 0.08);

    // Outer shards
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 25; ctx.shadowColor = e.color;
    for (let i = 0; i < (e.phase === 2 ? 6 : 4); i++) {
        const angle = rot + (i * Math.PI * 2 / (e.phase === 2 ? 6 : 4));
        const ax = Math.cos(angle) * (e.size + 25);
        const ay = Math.sin(angle) * (e.size + 25);
        ctx.save();
        ctx.translate(ax, ay);
        ctx.rotate(angle);
        ctx.strokeRect(-9, -9, 18, 18);
        ctx.restore();
    }

    // Body
    ctx.fillStyle = '#0d0d1a';
    ctx.beginPath();
    ctx.arc(0, 0, e.size * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 3;
    ctx.stroke();

    // Pupil
    ctx.fillStyle = e.color;
    ctx.shadowBlur = 30;
    const lookX = Math.cos(frame * 0.025) * 12;
    const lookY = Math.sin(frame * 0.025) * 12;
    ctx.beginPath();
    ctx.arc(lookX, lookY, e.size * 0.45, 0, Math.PI * 2);
    ctx.fill();

    // Phase 2 inner ring
    if (e.phase === 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(lookX, lookY, e.size * 0.2, 0, Math.PI * 2);
        ctx.stroke();
    }

    ctx.restore();

    // Boss name above
    ctx.save();
    ctx.font = 'bold 14px "Share Tech Mono", monospace';
    ctx.fillStyle = e.color;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10; ctx.shadowColor = e.color;
    ctx.fillText(e.name, e.x, e.y - e.size - 18);
    if (e.phase === 2) {
        ctx.fillStyle = '#ff4444';
        ctx.font = '11px "Share Tech Mono"';
        ctx.fillText('ENRAGED', e.x, e.y - e.size - 4);
    }
    ctx.restore();
}

// ── End Game ──────────────────────────────────────────────────────
function endGame(win) {
    gameState = 'END';
    sfx.death();
    const minutesSurvived = Math.floor((1200 - gameTime) / 60);
    const secSurvived = Math.floor((1200 - gameTime) % 60);
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('end-title').innerText = win ? '☀ GOD OF THE VOID ☀' : 'CONSUMED BY DARKNESS';
    document.getElementById('end-title').style.color = win ? '#fbbf24' : '#ef4444';
    document.getElementById('end-stats').innerHTML =
        `Level Reached: ${player.lvl}<br>` +
        `Enemies Killed: ${killCount}<br>` +
        `Time Survived: ${minutesSurvived}m ${secSurvived < 10 ? '0' : ''}${secSurvived}s<br>` +
        `Damage Per Bullet: ${player.damage}`;
}
</script>
